<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}WatchStore{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="header">
        <div class="container header-inner">
            <a href="{{ url_for('index') }}" class="logo">⌚ WatchStore</a>
            <nav class="nav">
                <a href="{{ url_for('index') }}">Shop</a>
                <a href="{{ url_for('cart') }}" class="cart-link">
                    Cart
                    <span class="cart-badge" id="cart-badge">{{ cart_item_count() }}</span>
                </a>
            </nav>
        </div>
    </header>

    <main class="main container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-messages">
                    {% for category, message in messages %}
                        <div class="flash flash-{{ category }}">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 WatchStore &mdash; Premium Timepieces</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/cart.js') }}"></script>
</body>
</html>
